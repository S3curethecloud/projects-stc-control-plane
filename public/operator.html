<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Operator Token | SecureTheCloud</title>
<link rel="stylesheet" href="assets/css/stc-control.css">
</head>

<body>

<div id="nav-container"></div>

<main class="container">

<h1>Operator Token Issuer</h1>

<section class="card">

<label>API Key</label>
<input id="api_key" type="text" placeholder="tenant API key">

<label>Operator Principal</label>
<input id="principal" type="text" value="admin">

<label>Scopes</label>
<input id="scopes" type="text" value="controlplane:access">

<label>TTL Seconds</label>
<input id="ttl" type="number" value="3600">

<button id="issue_token" class="button" type="button">Generate Token</button>

</section>

<section class="card">
  <h2>Operator Notes</h2>
  <div id="operator_notes" class="card-sub">Awaiting operator action...</div>
</section>

<section class="card">
  <h2>Token Output</h2>
  <textarea id="token_output" rows="12" style="width:100%;"></textarea>
</section>

</main>

<script src="assets/js/layout.js"></script>
<script src="assets/js/operator.js"></script>

</body>
</html>
