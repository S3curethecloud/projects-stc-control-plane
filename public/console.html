<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SecureTheCloud Console</title>
<link rel="stylesheet" href="/assets/css/stc-control.css">
</head>

<body>

<div id="nav-container"></div>

<main class="container">

<h1>Platform Overview</h1>

<section class="card-grid">

<div class="card">
<h3>Runtime Status</h3>
<div id="runtime_status">--</div>
</div>

<div class="card">
<h3>Redis Status</h3>
<div id="redis_status">--</div>
</div>

<div class="card">
<h3>Policy Revision</h3>
<div id="policy_revision">--</div>
</div>

<div class="card">
<h3>Tenant Count</h3>
<div id="tenant_count">--</div>
</div>

<div class="card">
<h3>Active Sessions</h3>
<div id="active_sessions">--</div>
</div>

</section>

<h2>Platform Metrics</h2>

<section class="card-grid">

<div class="card">
<h3>Tokens Issued</h3>
<div id="tokens_issued">--</div>
</div>

<div class="card">
<h3>Policy Denied</h3>
<div id="policy_denied">--</div>
</div>

<div class="card">
<h3>Sessions Revoked</h3>
<div id="sessions_revoked">--</div>
</div>

</section>

<h2>Tenant Preview</h2>

<div class="stream-indicator">
  Activity Stream: <span id="stream_status">Connecting...</span>
</div>

<table class="data-table">
<thead>
<tr>
<th>Tenant ID</th>
<th>Label</th>
<th>Status</th>
<th>Policy Version</th>
<th>Created</th>
<th></th>
</tr>
</thead>
<tbody id="tenant_table"></tbody>
</table>

</main>

<script src="/assets/js/layout.js"></script>
<script src="/assets/js/api.js"></script>
<script src="/assets/js/console.js"></script>

</body>
</html>
