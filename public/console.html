<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>STC Control Plane — Console</title>
  <link rel="stylesheet" href="/assets/css/stc-control.css" />
</head>
<body class="stc-dark">

<header class="console-header">
  <h1>SecureTheCloud Control Plane</h1>
  <span class="env-badge">Runtime Authority</span>
</header>

<div class="runtime-bar">
  <div class="runtime-metric">
    <span class="metric-label">Runtime</span>
    <span id="metric-runtime" class="metric-value status-ok">OK</span>
  </div>

  <div class="runtime-metric">
    <span class="metric-label">Active Sessions</span>
    <span id="metric-sessions" class="metric-value">0</span>
  </div>

  <div class="runtime-metric">
    <span class="metric-label">Policy Revision</span>
    <span id="metric-policy" class="metric-value">—</span>
  </div>
</div>

<main class="console-grid">

  <!-- Runtime Health -->
  <section class="card">
    <h2>Runtime Health</h2>
    <div id="health-status" class="status">Checking…</div>
    <button id="refresh-health" class="btn">Refresh</button>
  </section>

  <!-- Audit Chain -->
  <section class="card">
    <h2>Audit Chain</h2>
    <div id="audit-status" class="status">Loading…</div>
    <button id="refresh-audit" class="btn">Verify Chain</button>
  </section>

  <!-- Active Sessions -->
  <section class="card">
    <h2>Active Sessions</h2>
    <div class="table-container">
      <table id="sessions-table">
        <thead>
          <tr>
            <th>Session ID</th>
            <th>Principal</th>
            <th>Intent</th>
            <th>TTL Remaining</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="sessions-body">
          <tr>
            <td colspan="5" class="muted">Loading...</td>
          </tr>
        </tbody>
      </table>
    </div>
    <button id="refresh-sessions" class="btn">Refresh Sessions</button>
  </section>

  <!-- Token Introspection -->
  <section class="card">
    <h2>Token Introspection</h2>
    <textarea id="introspect-token" class="input" rows="5" placeholder="Paste access_token (JWT) here..."></textarea>
    <button id="introspect-btn" class="btn">Introspect</button>
    <div id="introspect-result" class="status"></div>
  </section>

  <!-- Session Revocation -->
  <section class="card">
    <h2>Revoke Session</h2>
    <input id="session-id" placeholder="Enter Session ID (SID-...)" />
    <button id="revoke-btn" class="btn btn-danger">Revoke</button>
    <div id="revoke-result" class="status"></div>
  </section>

</main>

<script src="/assets/js/api.js"></script>
<script src="/assets/js/console.js"></script>

</body>
</html>
