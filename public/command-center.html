<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SecureTheCloud Command Center</title>

<link rel="stylesheet" href="/assets/css/stc-control.css">

<style>

body{
background:#0a1224;
color:#e5e9f0;
font-family:system-ui;
}

.container{
width:92%;
margin:auto;
padding-top:30px;
}

h1{
font-size:28px;
margin-bottom:25px;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:35px;
}

.card{
background:#0f1c33;
padding:22px;
border-radius:10px;
box-shadow:0 4px 20px rgba(0,0,0,.4);
}

.card h3{
font-size:14px;
margin-bottom:10px;
color:#8aa4d4;
}

.card-value{
font-size:24px;
font-weight:600;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th{
text-align:left;
font-size:13px;
color:#8aa4d4;
padding:10px;
border-bottom:1px solid #1c2b4d;
}

td{
padding:10px;
font-size:13px;
border-bottom:1px solid #1c2b4d;
}

.status-allow{
color:#2ecc71;
font-weight:600;
}

.status-deny{
color:#e74c3c;
font-weight:600;
}

button{
background:#2f6df6;
border:none;
color:white;
padding:6px 12px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#4b82ff;
}

.stream-indicator{
font-size:12px;
margin-bottom:8px;
color:#8aa4d4;
}

</style>
</head>


<body>

<div class="container">

<h1>SecureTheCloud Runtime Command Center</h1>


<!-- STATUS PANELS -->

<div class="grid">

<div class="card">
<h3>Audit Integrity</h3>
<div id="audit_status" class="card-value">--</div>
<div id="audit_events"></div>
</div>

<div class="card">
<h3>Active Sessions</h3>
<div id="session_count" class="card-value">--</div>
</div>

<div class="card">
<h3>Policy Revision</h3>
<div id="policy_revision" class="card-value">--</div>
</div>

<div class="card">
<h3>Risk Level</h3>
<div id="risk_level" class="card-value">LOW</div>
</div>

</div>


<!-- LIVE DECISION STREAM -->

<h2>Live Authorization Decisions</h2>

<div class="stream-indicator">
Stream: <span id="stream_status">Connecting...</span>
</div>

<table>
<thead>

<tr>
<th>Time</th>
<th>Tenant</th>
<th>Principal</th>
<th>Intent</th>
<th>Decision</th>
<th>Risk</th>
<th>Policy</th>
</tr>

</thead>

<tbody id="activity_table"></tbody>

</table>


<!-- ACTIVE SESSIONS -->

<h2 style="margin-top:40px;">Active Sessions</h2>

<table>

<thead>

<tr>
<th>Session ID</th>
<th>Principal</th>
<th>Intent</th>
<th>TTL</th>
<th>Action</th>
</tr>

</thead>

<tbody id="sessions_table"></tbody>

</table>

</div>


<script src="/assets/js/api.js"></script>

<script>

const API_KEY = localStorage.getItem("STC_API_KEY")

const STREAM_URL =
"https://ztr-runtime.fly.dev/v1/decisions/stream"

function formatTime(ts){
return new Date(ts*1000).toLocaleTimeString()
}


/* ================================
   DECISION STREAM
================================ */

function decisionClass(decision){

if(decision==="allow") return "status-allow"
if(decision==="deny") return "status-deny"

return ""

}

function addDecisionRow(event){

const table = document.getElementById("activity_table")

const row=document.createElement("tr")

row.innerHTML=`
<td>${formatTime(event.timestamp)}</td>
<td>${event.tenant_id}</td>
<td>${event.principal}</td>
<td>${event.intent}</td>
<td class="${decisionClass(event.decision)}">${event.decision}</td>
<td>${event.risk_score||""}</td>
<td>${event.policy_revision||""}</td>
`

table.prepend(row)

if(table.children.length>100){
table.removeChild(table.lastChild)
}

updateRisk(event.risk_score)

}

function startStream(){

const status=document.getElementById("stream_status")

const url=`${STREAM_URL}?api_key=${API_KEY}`

const source=new EventSource(url)

status.innerText="Connected"

source.onmessage=(msg)=>{

try{

const event=JSON.parse(msg.data)

addDecisionRow(event)

}catch(err){

console.error("stream parse error",err)

}

}

source.onerror=()=>{

status.innerText="Reconnecting..."

source.close()

setTimeout(startStream,3000)

}

}


/* ================================
   RISK INDICATOR
================================ */

function updateRisk(score){

let level="LOW"

if(score>=60) level="HIGH"
else if(score>=30) level="MEDIUM"

document.getElementById("risk_level").textContent=level

}


/* ================================
   AUDIT INTEGRITY
================================ */

async function loadIntegrity(){

const res=await fetch(
"https://ztr-runtime.fly.dev/v1/audit/verify",
{headers:{"X-Stc-Api-Key":API_KEY}}
)

const data=await res.json()

document.getElementById("audit_status").textContent=
data.status==="valid"?"✔ VALID":"BROKEN"

document.getElementById("audit_events").textContent=
"Events Verified: "+data.events_verified

}


/* ================================
   ACTIVE SESSIONS
================================ */

async function loadSessions(){

const res=await fetch(
"https://ztr-runtime.fly.dev/v1/sessions/active",
{headers:{"X-Stc-Api-Key":API_KEY}}
)

const data=await res.json()

document.getElementById("session_count").textContent=
data.active_sessions

const table=document.getElementById("sessions_table")

table.innerHTML=""

for(const s of data.sessions){

const row=document.createElement("tr")

row.innerHTML=`
<td>${s.session_id}</td>
<td>${s.principal}</td>
<td>${s.intent}</td>
<td>${s.ttl}s</td>
<td><button onclick="revoke('${s.session_id}')">Revoke</button></td>
`

table.appendChild(row)

}

}


async function revoke(sessionId){

await fetch(
"https://ztr-runtime.fly.dev/v1/sessions/revoke",
{
method:"POST",
headers:{
"Content-Type":"application/json",
"X-Stc-Api-Key":API_KEY
},
body:JSON.stringify({session_id:sessionId})
}
)

loadSessions()

}


/* ================================
   REFRESH LOOP
================================ */

setInterval(loadSessions,5000)

setInterval(loadIntegrity,10000)


/* ================================
   INIT
================================ */

startStream()
loadSessions()
loadIntegrity()

</script>

</body>
</html>
