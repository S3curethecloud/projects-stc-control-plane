<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>SecureTheCloud Control Plane</title>
<link rel="stylesheet" href="/assets/css/stc-control.css"/>
</head>

<body>
<div class="container">
  <header>
    <h1>SecureTheCloud — Control Plane</h1>
  </header>

  <div class="panel">
    <p>Enter authorized control-plane token.</p>
    <input id="token" type="password" placeholder="Bearer token"/>
    <br/><br/>
    <button class="btn btn-primary" id="enter">Enter</button>
  </div>
</div>

<script>
document.getElementById("enter").onclick = () => {
  const token = document.getElementById("token").value.trim();
  if(token){
    window.__STC_TOKEN = token;
    window.location.href="/shield";
  }
};
</script>
</body>
</html>
