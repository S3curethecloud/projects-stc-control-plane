<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SecureTheCloud Console Login</title>
<link rel="stylesheet" href="assets/css/stc-control.css">
</head>

<body>

<main class="container">

<h1>SecureTheCloud Console</h1>

<section class="card">

<h2>Control Plane Access</h2>

<label>Admin Secret</label>
<input id="admin_secret" type="password" placeholder="X-Stc-Admin-Secret"/>

<label>Tenant API Key (optional)</label>
<input id="api_key" type="text" placeholder="X-Stc-Api-Key"/>

<div class="toolbar">

<button onclick="saveCredentials()">Enter Console</button>
<button onclick="clearCredentials()">Clear Stored Keys</button>

</div>

</section>

<section class="card">

<p>
The Admin Secret is required for the control plane.
The Tenant API Key enables runtime operations such as session inspection.
</p>

</section>

</main>

<script src="assets/js/auth.js"></script>
<script src="assets/js/login.js"></script>

</body>
</html>
