<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Blast Radius | SecureTheCloud</title>
<link rel="stylesheet" href="assets/css/stc-control.css">
</head>

<body>

<div id="nav-container"></div>

<main class="container">

<h1>Blast Radius Viewer</h1>
<p>Visual chain of AI agent authorization and impacted resources.</p>

<!-- Summary Cards -->

<div class="summary-grid">

<div class="summary-card">
<h3>Total Decisions</h3>
<span id="total_decisions">0</span>
</div>

<div class="summary-card">
<h3>High Risk</h3>
<span id="high_risk">0</span>
</div>

<div class="summary-card">
<h3>Active Agents</h3>
<span id="active_agents">0</span>
</div>

<div class="summary-card">
<h3>Tenants Impacted</h3>
<span id="active_tenants">0</span>
</div>

</div>


<!-- Graph Container -->

<div class="graph-container">
<h2>Blast Radius Graph</h2>
<div id="blast_graph"></div>
</div>


<!-- Event Table -->

<h2>Event Timeline</h2>

<table class="data-table">

<thead>
<tr>
<th>Time</th>
<th>Agent</th>
<th>Intent</th>
<th>Tenant</th>
<th>Decision</th>
<th>Impact</th>
</tr>
</thead>

<tbody id="blast_table"></tbody>

</table>

</main>

<script defer src="https://unpkg.com/cytoscape@3.26.0/dist/cytoscape.min.js"></script>
<script defer src="assets/js/layout.js"></script>
<script defer src="assets/js/api.js"></script>
<script defer src="assets/js/blast-radius.js"></script>

</body>
</html>
