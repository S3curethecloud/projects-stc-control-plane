<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SecureTheCloud Sessions</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="/assets/css/stc-control.css">
</head>

<body>

  <div id="nav-container"></div>

  <main class="container">

    <h1>Active Sessions</h1>

    <p class="card-sub">
      Real-time authorization sessions issued and enforced by policy.
    </p>

    <section class="card">
      <div class="toolbar">
        <button id="refresh_sessions_btn" class="button" type="button">Refresh</button>
      </div>

      <div class="table-shell">
        <table class="data-table">
          <thead>
            <tr>
              <th>Tenant</th>
              <th>Session ID</th>
              <th>Principal</th>
              <th>Intent</th>
              <th>Scopes</th>
              <th>Issued</th>
              <th>TTL</th>
              <th>Action</th>
            </tr>
          </thead>

          <tbody id="sessions_table">
            <tr id="sessions_empty">
              <td colspan="8" class="empty">Awaiting platform session inventory...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

    <section class="card">
      <div class="note info">
        Active sessions are policy-evaluated and time-bound.
      </div>
    </section>

    <section class="card">
      <h2>Session Notes</h2>
      <div id="sessions_notes" class="card-sub">Awaiting session telemetry...</div>
    </section>

  </main>

  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/layout.js"></script>
  <script src="/assets/js/sessions.js"></script>

</body>
</html>
